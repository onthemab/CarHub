<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CarHub">
<meta name="theme-color" content="#1A1A18">
<title>CarHub</title>
<link id="pwa-manifest" rel="manifest">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#1A1A18;position:fixed;}
#splash{
  position:fixed;inset:0;background:#1A1A18;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:999;transition:opacity .5s ease;
}
#splash.hide{opacity:0;pointer-events:none;}
.sp-logo{
  width:88px;height:88px;background:#2563EB;border-radius:22px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:20px;box-shadow:0 8px 32px rgba(37,99,235,0.5);
}
.sp-name{color:white;font-size:28px;font-weight:700;
  font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;letter-spacing:-0.5px;}
.sp-sub{color:rgba(255,255,255,0.35);font-size:13px;
  font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;margin-top:6px;}
.sp-dots{display:flex;gap:7px;margin-top:44px;}
.sp-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.15);animation:pulse 1.2s ease infinite;}
.sp-dot:nth-child(2){animation-delay:.2s;}
.sp-dot:nth-child(3){animation-delay:.4s;}
@keyframes pulse{0%,80%,100%{transform:scale(.8);opacity:.4}40%{transform:scale(1);opacity:1;background:#2563EB;}}
#frame{
  position:fixed;inset:0;
  width:100%;height:100%;
  border:none;display:block;background:#F7F7F5;
}
#install-bar{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:#1A1A18;color:white;
  padding:14px 16px;padding-bottom:calc(14px + env(safe-area-inset-bottom,0px));
  flex-direction:row;align-items:center;gap:12px;
  z-index:1000;border-top:1px solid rgba(255,255,255,0.08);
  font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
}
</style>
</head>
<body>

<div id="splash">
  <div class="sp-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" width="44" height="44">
      <path d="M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h11a2 2 0 012 2v3"/>
      <rect x="9" y="11" width="14" height="10" rx="2"/>
      <circle cx="12" cy="17" r="1" fill="white" stroke="none"/>
      <circle cx="20" cy="17" r="1" fill="white" stroke="none"/>
    </svg>
  </div>
  <div class="sp-name">CarHub</div>
  <div class="sp-sub">Manajemen Kendaraan Bekas</div>
  <div class="sp-dots">
    <div class="sp-dot"></div>
    <div class="sp-dot"></div>
    <div class="sp-dot"></div>
  </div>
</div>

<iframe id="frame"
  src="https://script.google.com/macros/s/AKfycbw9S63kjsSGLznPi_ZBZ3HR0Ym_HF5ELYF843esBqceSY6JmCzlVM_qoBJuahbhVDzNwQ/exec"
  allow="fullscreen"
  sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-top-navigation allow-downloads">
</iframe>

<div id="install-bar">
  <div style="width:40px;height:40px;background:#2563EB;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" width="20" height="20">
      <path d="M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h11a2 2 0 012 2v3"/>
      <rect x="9" y="11" width="14" height="10" rx="2"/>
      <circle cx="12" cy="17" r="1" fill="white" stroke="none"/>
      <circle cx="20" cy="17" r="1" fill="white" stroke="none"/>
    </svg>
  </div>
  <div style="flex:1;">
    <div style="font-weight:700;font-size:14px;">Install CarHub</div>
    <div style="font-size:11px;opacity:0.5;margin-top:2px;">Buka fullscreen tanpa address bar</div>
  </div>
  <button onclick="doInstall()" style="background:#2563EB;color:white;border:none;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;">Install</button>
  <button onclick="document.getElementById('install-bar').style.display='none'" style="background:none;border:none;color:rgba(255,255,255,0.3);font-size:24px;cursor:pointer;padding:0 2px;line-height:1;flex-shrink:0;">&times;</button>
</div>

<script>
// ── Manifest inline (tidak perlu file terpisah) ──
(function(){
  var m = {
    name:"CarHub", short_name:"CarHub",
    description:"Manajemen Kendaraan Bekas",
    start_url:"./", display:"standalone",
    orientation:"portrait-primary",
    background_color:"#1A1A18", theme_color:"#1A1A18",
    icons:[
      {src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%231A1A18'/%3E%3Cpath d='M38 128H26a14 14 0 01-14-14V64a14 14 0 0114-14h98a14 14 0 0114 14v28' stroke='white' stroke-width='14' fill='none' stroke-linecap='round'/%3E%3Crect x='88' y='96' width='92' height='54' rx='12' stroke='white' stroke-width='14' fill='none'/%3E%3Ccircle cx='102' cy='136' r='9' fill='white'/%3E%3Ccircle cx='166' cy='136' r='9' fill='white'/%3E%3C/svg%3E",sizes:"192x192",type:"image/svg+xml",purpose:"any maskable"},
      {src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%231A1A18'/%3E%3Cpath d='M96 340H68a38 38 0 01-38-38V168a38 38 0 0138-38h264a38 38 0 0138 38v76' stroke='white' stroke-width='36' fill='none' stroke-linecap='round'/%3E%3Crect x='234' y='248' width='248' height='146' rx='32' stroke='white' stroke-width='36' fill='none'/%3E%3Ccircle cx='272' cy='354' r='24' fill='white'/%3E%3Ccircle cx='444' cy='354' r='24' fill='white'/%3E%3C/svg%3E",sizes:"512x512",type:"image/svg+xml",purpose:"any maskable"}
    ]
  };
  var b = new Blob([JSON.stringify(m)],{type:"application/json"});
  document.getElementById("pwa-manifest").href = URL.createObjectURL(b);
})();

// ── Splash hide saat iframe load ──
var _splashHidden = false;
function hideSplash(){
  if(_splashHidden) return; _splashHidden = true;
  document.getElementById("splash").classList.add("hide");
}
document.getElementById("frame").addEventListener("load", function(){ setTimeout(hideSplash, 800); });
setTimeout(hideSplash, 6000);

// ── PWA Install prompt ──
var _prompt = null;
window.addEventListener("beforeinstallprompt", function(e){
  e.preventDefault(); _prompt = e;
  setTimeout(function(){
    document.getElementById("install-bar").style.display = "flex";
  }, 2000);
});
function doInstall(){
  if(!_prompt) return;
  _prompt.prompt();
  _prompt.userChoice.then(function(){
    _prompt = null;
    document.getElementById("install-bar").style.display = "none";
  });
}
window.addEventListener("appinstalled", function(){
  document.getElementById("install-bar").style.display = "none";
});
</script>
</body>
</html>
